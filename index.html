<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5E6875" />
    <meta name="description" content="ProLine Aluminium — window and door repairs, hardware, retrofit glazing. Christchurch & Canterbury." />
    <title>ProLine Aluminium</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('proline:theme-mode') || 'system'
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (t === 'dark' || (t === 'system' && prefersDark)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
